<button
  type="button"
  onclick="{% if include.new_tab %}window.open('{{ include.url }}', '_blank', 'noopener,noreferrer'){% else %}window.location='{{ include.url }}'{% endif %}"
  class="btn btn-{{ include.button_class }} active{% if include.custom_class %} {{ include.custom_class }}{% endif %}">
  {{ include.button_name }}
</button>
